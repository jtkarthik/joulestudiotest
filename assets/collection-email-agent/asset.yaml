apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: collection-email-agent
  version: 1.0.0
  description: AI agent that reads SAP S/4HANA AR data and generates personalized collection email drafts for human review

type: agent

container:
  buildPath: .
  port: 5000

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
